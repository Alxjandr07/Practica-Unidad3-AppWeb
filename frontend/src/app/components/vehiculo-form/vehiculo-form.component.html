<div class="form-container">
  <div class="form-card">
    <header class="header">
      <h2>{{ isEditMode ? 'Editar' : 'Nuevo' }} Vehículo</h2>
      <button class="btn btn-secondary" routerLink="/vehiculos">Volver</button>
    </header>

    <form [formGroup]="vehiculoForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Placa</label>
          <input type="text" formControlName="placa" placeholder="AAA-1234">
          <small class="error" *ngIf="vehiculoForm.get('placa')?.invalid && vehiculoForm.get('placa')?.touched">
            Placa inválida (Ej: ABC-1234)
          </small>
        </div>

        <div class="form-group">
          <label>Marca</label>
          <input type="text" formControlName="marca" placeholder="Marca">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" formControlName="modelo" placeholder="Modelo">
        </div>

        <div class="form-group">
          <label>Año Fabricación</label>
          <input type="number" formControlName="anioFabricacion">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Capacidad Pasajeros</label>
          <input type="number" formControlName="capacidadPasajeros">
        </div>

        <div class="form-group">
          <label>Tipo Servicio</label>
          <select formControlName="tipoServicio">
            <option value="URBANO">Urbano</option>
            <option value="INTERPROVINCIAL">Interprovincial</option>
            <option value="ESCOLAR">Escolar</option>
          </select>
        </div>
      </div>

      <div class="form-group" *ngIf="isEditMode">
        <label>Estado</label>
        <select formControlName="estado">
          <option value="ACTIVO">Activo</option>
          <option value="MANTENIMIENTO">Mantenimiento</option>
          <option value="INACTIVO">Inactivo</option>
        </select>
      </div>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="vehiculoForm.invalid || loading">
          {{ loading ? 'Guardando...' : 'Guardar Vehículo' }}
        </button>
      </div>
    </form>
  </div>
</div>
