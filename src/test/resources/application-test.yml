# Perfil de test: H2 en memoria, sin Flyway (el schema lo crea Hibernate) para que
# los tests de repositorio corran rapido y aislados, sin depender de Postgres/Redis.
spring:
  datasource:
    url: jdbc:h2:mem:unidad3_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cache:
    type: none
